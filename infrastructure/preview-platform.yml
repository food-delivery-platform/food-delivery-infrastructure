AWSTemplateFormatVersion: "2010-09-09"

Description: >-
  Temporary ECS cluster, internal ALB, API Gateway routes and integration,
  delivery-service and restaurant-service target groups, security groups,
  and a one-time EventBridge Scheduler cleanup schedule.

Parameters:
  DeliveryServiceContainerPort:
    Type: Number
    Default: 8080
    MinValue: 1
    MaxValue: 65535

  RestaurantServiceContainerPort:
    Type: Number
    Default: 8080
    MinValue: 1
    MaxValue: 65535

  DeliveryServiceHealthCheckPath:
    Type: String
    Default: "/health"

  RestaurantServiceHealthCheckPath:
    Type: String
    Default: "/health"

  DeliveryServiceBasePath:
    Type: String
    Default: "/api/deliveries"
    Description: API base path without a trailing slash.

  RestaurantServiceBasePath:
    Type: String
    Default: "/api/restaurants"
    Description: API base path without a trailing slash.

  RestaurantCategoryBasePath:
    Type: String
    Default: "/api/categories"
    Description: Restaurant service categories API base path without a trailing slash.

  RestaurantMenuItemBasePath:
    Type: String
    Default: "/api/menu-items"
    Description: Restaurant service menu items API base path without a trailing slash.

  RestaurantServiceImageUri:
    Type: String
    Default: ""
    Description: Full restaurant-service container image URI, such as account.dkr.ecr.region.amazonaws.com/repository:tag. Leave empty to skip creating the runtime service.

  RestaurantServiceDesiredCount:
    Type: Number
    Default: 1
    MinValue: 0
    MaxValue: 10

  CleanupScheduleExpression:
    Type: String
    Description: One-time expression such as at(2026-07-15T18:30:00).

Conditions:
  CreateRestaurantService: !Not [!Equals [!Ref RestaurantServiceImageUri, ""]]

Resources:
  PreviewCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: food-delivery-preview-cluster
      ClusterSettings:
        - Name: containerInsights
          Value: disabled
      Tags:
        - Key: Project
          Value: food-delivery
        - Key: Environment
          Value: preview
        - Key: Lifetime
          Value: temporary

  PreviewClusterCapacityProviders:
    Type: AWS::ECS::ClusterCapacityProviderAssociations
    Properties:
      Cluster: !Ref PreviewCluster
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: API Gateway VPC Link access to the internal ALB
      VpcId:
        Fn::ImportValue: food-delivery-network-vpc-id
      SecurityGroupIngress:
        - Description: VPC Link to internal ALB
          IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId:
            Fn::ImportValue: food-delivery-vpc-link-sg-id
      SecurityGroupEgress:
        - Description: ALB traffic to Fargate tasks
          IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: food-delivery-preview-internal-alb-sg
        - Key: Lifetime
          Value: temporary

  DeliveryTaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Internal ALB access to delivery-service
      VpcId:
        Fn::ImportValue: food-delivery-network-vpc-id
      SecurityGroupIngress:
        - Description: ALB to delivery-service
          IpProtocol: tcp
          FromPort: !Ref DeliveryServiceContainerPort
          ToPort: !Ref DeliveryServiceContainerPort
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      SecurityGroupEgress:
        - Description: Outbound application traffic
          IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: food-delivery-delivery-task-sg
        - Key: Service
          Value: delivery-service
        - Key: Lifetime
          Value: temporary

  RestaurantTaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Internal ALB access to restaurant-service
      VpcId:
        Fn::ImportValue: food-delivery-network-vpc-id
      SecurityGroupIngress:
        - Description: ALB to restaurant-service
          IpProtocol: tcp
          FromPort: !Ref RestaurantServiceContainerPort
          ToPort: !Ref RestaurantServiceContainerPort
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      SecurityGroupEgress:
        - Description: Outbound application traffic
          IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: food-delivery-restaurant-task-sg
        - Key: Service
          Value: restaurant-service
        - Key: Lifetime
          Value: temporary

  RestaurantLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: CreateRestaurantService
    Properties:
      LogGroupName: /aws/ecs/food-delivery/restaurant-service-preview
      RetentionInDays: 7
      Tags:
        - Key: Service
          Value: restaurant-service
        - Key: Lifetime
          Value: temporary

  RestaurantTaskExecutionRole:
    Type: AWS::IAM::Role
    Condition: CreateRestaurantService
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: Service
          Value: restaurant-service
        - Key: Lifetime
          Value: temporary

  RestaurantTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Condition: CreateRestaurantService
    Properties:
      Family: food-delivery-restaurant-preview
      Cpu: "512"
      Memory: "1024"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt RestaurantTaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: restaurant-service
          Image: !Ref RestaurantServiceImageUri
          Essential: true
          PortMappings:
            - ContainerPort: !Ref RestaurantServiceContainerPort
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref RestaurantLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: restaurant
      Tags:
        - Key: Service
          Value: restaurant-service
        - Key: Lifetime
          Value: temporary

  InternalLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: food-delivery-preview-alb
      Type: application
      Scheme: internal
      IpAddressType: ipv4
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets:
        - Fn::ImportValue: food-delivery-network-public-subnet-a-id
        - Fn::ImportValue: food-delivery-network-public-subnet-b-id
      Tags:
        - Key: Project
          Value: food-delivery
        - Key: Environment
          Value: preview
        - Key: Lifetime
          Value: temporary

  DeliveryTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: food-delivery-delivery-preview
      VpcId:
        Fn::ImportValue: food-delivery-network-vpc-id
      Protocol: HTTP
      Port: !Ref DeliveryServiceContainerPort
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPort: traffic-port
      HealthCheckPath: !Ref DeliveryServiceHealthCheckPath
      HealthCheckIntervalSeconds: 15
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200-399"
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "15"
      Tags:
        - Key: Service
          Value: delivery-service
        - Key: Lifetime
          Value: temporary

  RestaurantTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: food-delivery-rest-preview
      VpcId:
        Fn::ImportValue: food-delivery-network-vpc-id
      Protocol: HTTP
      Port: !Ref RestaurantServiceContainerPort
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPort: traffic-port
      HealthCheckPath: !Ref RestaurantServiceHealthCheckPath
      HealthCheckIntervalSeconds: 15
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200-399"
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "15"
      Tags:
        - Key: Service
          Value: restaurant-service
        - Key: Lifetime
          Value: temporary

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref InternalLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            ContentType: application/json
            StatusCode: "404"
            MessageBody: '{"message":"route not found"}'

  DeliveryListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - !Ref DeliveryServiceBasePath
              - !Sub "${DeliveryServiceBasePath}/*"
      Actions:
        - Type: forward
          TargetGroupArn: !Ref DeliveryTargetGroup

  RestaurantListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpListener
      Priority: 20
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - !Ref RestaurantServiceBasePath
              - !Sub "${RestaurantServiceBasePath}/*"
      Actions:
        - Type: forward
          TargetGroupArn: !Ref RestaurantTargetGroup

  RestaurantCategoryListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpListener
      Priority: 21
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - !Ref RestaurantCategoryBasePath
              - !Sub "${RestaurantCategoryBasePath}/*"
      Actions:
        - Type: forward
          TargetGroupArn: !Ref RestaurantTargetGroup

  RestaurantMenuItemListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpListener
      Priority: 22
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - !Ref RestaurantMenuItemBasePath
              - !Sub "${RestaurantMenuItemBasePath}/*"
      Actions:
        - Type: forward
          TargetGroupArn: !Ref RestaurantTargetGroup

  PrivateAlbIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId:
        Fn::ImportValue: food-delivery-http-api-id
      Description: API Gateway private HTTP proxy to the internal ALB
      IntegrationType: HTTP_PROXY
      IntegrationMethod: ANY
      ConnectionType: VPC_LINK
      ConnectionId:
        Fn::ImportValue: food-delivery-vpc-link-id
      IntegrationUri: !Ref HttpListener
      PayloadFormatVersion: "1.0"
      RequestParameters:
        "overwrite:path": "$request.path"
        "overwrite:header.x-request-id": "$context.requestId"

  DeliveryBaseRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Fn::ImportValue: food-delivery-http-api-id
      RouteKey: !Sub "ANY ${DeliveryServiceBasePath}"
      AuthorizationType: NONE
      Target: !Join ["/", ["integrations", !Ref PrivateAlbIntegration]]

  DeliveryProxyRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Fn::ImportValue: food-delivery-http-api-id
      RouteKey: !Sub "ANY ${DeliveryServiceBasePath}/{proxy+}"
      AuthorizationType: NONE
      Target: !Join ["/", ["integrations", !Ref PrivateAlbIntegration]]

  RestaurantBaseRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Fn::ImportValue: food-delivery-http-api-id
      RouteKey: !Sub "ANY ${RestaurantServiceBasePath}"
      AuthorizationType: NONE
      Target: !Join ["/", ["integrations", !Ref PrivateAlbIntegration]]

  RestaurantProxyRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Fn::ImportValue: food-delivery-http-api-id
      RouteKey: !Sub "ANY ${RestaurantServiceBasePath}/{proxy+}"
      AuthorizationType: NONE
      Target: !Join ["/", ["integrations", !Ref PrivateAlbIntegration]]

  RestaurantCategoryBaseRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Fn::ImportValue: food-delivery-http-api-id
      RouteKey: !Sub "ANY ${RestaurantCategoryBasePath}"
      AuthorizationType: NONE
      Target: !Join ["/", ["integrations", !Ref PrivateAlbIntegration]]

  RestaurantCategoryProxyRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Fn::ImportValue: food-delivery-http-api-id
      RouteKey: !Sub "ANY ${RestaurantCategoryBasePath}/{proxy+}"
      AuthorizationType: NONE
      Target: !Join ["/", ["integrations", !Ref PrivateAlbIntegration]]

  RestaurantMenuItemBaseRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Fn::ImportValue: food-delivery-http-api-id
      RouteKey: !Sub "ANY ${RestaurantMenuItemBasePath}"
      AuthorizationType: NONE
      Target: !Join ["/", ["integrations", !Ref PrivateAlbIntegration]]

  RestaurantMenuItemProxyRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Fn::ImportValue: food-delivery-http-api-id
      RouteKey: !Sub "ANY ${RestaurantMenuItemBasePath}/{proxy+}"
      AuthorizationType: NONE
      Target: !Join ["/", ["integrations", !Ref PrivateAlbIntegration]]

  RestaurantService:
    Type: AWS::ECS::Service
    Condition: CreateRestaurantService
    DependsOn:
      - PreviewClusterCapacityProviders
      - RestaurantListenerRule
      - RestaurantCategoryListenerRule
      - RestaurantMenuItemListenerRule
    Properties:
      ServiceName: restaurant-service-preview
      Cluster: !Ref PreviewCluster
      DesiredCount: !Ref RestaurantServiceDesiredCount
      CapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 0
      HealthCheckGracePeriodSeconds: 60
      LoadBalancers:
        - ContainerName: restaurant-service
          ContainerPort: !Ref RestaurantServiceContainerPort
          TargetGroupArn: !Ref RestaurantTargetGroup
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref RestaurantTaskSecurityGroup
          Subnets:
            - Fn::ImportValue: food-delivery-network-public-subnet-a-id
            - Fn::ImportValue: food-delivery-network-public-subnet-b-id
      TaskDefinition: !Ref RestaurantTaskDefinition
      Tags:
        - Key: Service
          Value: restaurant-service
        - Key: Lifetime
          Value: temporary

  PreviewCleanupSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: food-delivery-preview-cleanup
      Description: Delete the temporary food-delivery runtime after expiration
      State: ENABLED
      ScheduleExpression: !Ref CleanupScheduleExpression
      ScheduleExpressionTimezone: UTC
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn:
          Fn::ImportValue: food-delivery-cleanup-state-machine-arn
        RoleArn:
          Fn::ImportValue: food-delivery-cleanup-scheduler-role-arn
        Input: "{}"
        RetryPolicy:
          MaximumEventAgeInSeconds: 3600
          MaximumRetryAttempts: 3

Outputs:
  ClusterName:
    Value: !Ref PreviewCluster

  DeliveryTargetGroupArn:
    Value: !Ref DeliveryTargetGroup

  RestaurantTargetGroupArn:
    Value: !Ref RestaurantTargetGroup

  DeliveryTaskSecurityGroupId:
    Value: !Ref DeliveryTaskSecurityGroup

  RestaurantTaskSecurityGroupId:
    Value: !Ref RestaurantTaskSecurityGroup

  SubnetIds:
    Value:
      Fn::ImportValue: food-delivery-network-public-subnet-ids

  AssignPublicIp:
    Description: Runtime ECS services must assign public IPs when using the exported public subnets.
    Value: ENABLED

  DefaultCapacityProvider:
    Value: FARGATE

  RestaurantServiceName:
    Condition: CreateRestaurantService
    Value: restaurant-service-preview

  RestaurantTaskDefinitionArn:
    Condition: CreateRestaurantService
    Value: !Ref RestaurantTaskDefinition

  ApiEndpoint:
    Value:
      Fn::ImportValue: food-delivery-http-api-endpoint

  CleanupScheduleExpression:
    Value: !Ref CleanupScheduleExpression
