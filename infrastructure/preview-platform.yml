AWSTemplateFormatVersion: "2010-09-09"
Description: Temporary ECS cluster, internal ALB, API integration, routes, target groups, and security groups.

Parameters:
  OrderServiceContainerPort:
    Type: Number
    Default: 8080
  RestaurantServiceContainerPort:
    Type: Number
    Default: 8080
  OrderServiceHealthCheckPath:
    Type: String
    Default: "/health"
  RestaurantServiceHealthCheckPath:
    Type: String
    Default: "/health"

  CleanupScheduleExpression:
    Type: String
    Description: One-time EventBridge Scheduler expression, for example at(2026-07-15T18:30:00).

Resources:
  PreviewCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: food-delivery-preview-cluster
      ClusterSettings:
        - Name: containerInsights
          Value: disabled

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: API Gateway VPC Link access to internal ALB
      VpcId:
        Fn::ImportValue: food-delivery-network-vpc-id
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId:
            Fn::ImportValue: food-delivery-vpc-link-sg-id
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"

  OrderTaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Internal ALB access to order-service
      VpcId:
        Fn::ImportValue: food-delivery-network-vpc-id
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref OrderServiceContainerPort
          ToPort: !Ref OrderServiceContainerPort
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"

  RestaurantTaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Internal ALB access to restaurant-service
      VpcId:
        Fn::ImportValue: food-delivery-network-vpc-id
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref RestaurantServiceContainerPort
          ToPort: !Ref RestaurantServiceContainerPort
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"

  InternalLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: food-delivery-preview-alb
      Type: application
      Scheme: internal
      IpAddressType: ipv4
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets:
        - Fn::ImportValue: food-delivery-network-public-subnet-a-id
        - Fn::ImportValue: food-delivery-network-public-subnet-b-id

  OrderTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: food-delivery-order-preview
      VpcId:
        Fn::ImportValue: food-delivery-network-vpc-id
      Protocol: HTTP
      Port: !Ref OrderServiceContainerPort
      TargetType: ip
      HealthCheckPath: !Ref OrderServiceHealthCheckPath
      Matcher:
        HttpCode: "200-399"

  RestaurantTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: food-delivery-rest-preview
      VpcId:
        Fn::ImportValue: food-delivery-network-vpc-id
      Protocol: HTTP
      Port: !Ref RestaurantServiceContainerPort
      TargetType: ip
      HealthCheckPath: !Ref RestaurantServiceHealthCheckPath
      Matcher:
        HttpCode: "200-399"

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref InternalLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            ContentType: application/json
            StatusCode: "404"
            MessageBody: '{"message":"route not found"}'

  OrderListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - "/api/orders"
              - "/api/orders/*"
      Actions:
        - Type: forward
          TargetGroupArn: !Ref OrderTargetGroup

  RestaurantListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpListener
      Priority: 20
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - "/api/restaurants"
              - "/api/restaurants/*"
      Actions:
        - Type: forward
          TargetGroupArn: !Ref RestaurantTargetGroup

  PrivateAlbIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId:
        Fn::ImportValue: food-delivery-http-api-id
      IntegrationType: HTTP_PROXY
      IntegrationMethod: ANY
      ConnectionType: VPC_LINK
      ConnectionId:
        Fn::ImportValue: food-delivery-vpc-link-id
      IntegrationUri: !Ref HttpListener
      PayloadFormatVersion: "1.0"
      RequestParameters:
        "overwrite:path": "$request.path"
        "overwrite:header.x-user-id": "$context.authorizer.claims.sub"
        "overwrite:header.x-user-email": "$context.authorizer.claims.email"
        "overwrite:header.x-request-id": "$context.requestId"

  OrderBaseRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Fn::ImportValue: food-delivery-http-api-id
      RouteKey: "ANY /api/orders"
      AuthorizationType: JWT
      AuthorizerId:
        Fn::ImportValue: food-delivery-jwt-authorizer-id
      Target: !Join ["/", ["integrations", !Ref PrivateAlbIntegration]]

  OrderProxyRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Fn::ImportValue: food-delivery-http-api-id
      RouteKey: "ANY /api/orders/{proxy+}"
      AuthorizationType: JWT
      AuthorizerId:
        Fn::ImportValue: food-delivery-jwt-authorizer-id
      Target: !Join ["/", ["integrations", !Ref PrivateAlbIntegration]]

  RestaurantBaseRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Fn::ImportValue: food-delivery-http-api-id
      RouteKey: "ANY /api/restaurants"
      AuthorizationType: JWT
      AuthorizerId:
        Fn::ImportValue: food-delivery-jwt-authorizer-id
      Target: !Join ["/", ["integrations", !Ref PrivateAlbIntegration]]

  RestaurantProxyRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Fn::ImportValue: food-delivery-http-api-id
      RouteKey: "ANY /api/restaurants/{proxy+}"
      AuthorizationType: JWT
      AuthorizerId:
        Fn::ImportValue: food-delivery-jwt-authorizer-id
      Target: !Join ["/", ["integrations", !Ref PrivateAlbIntegration]]

  PreviewCleanupSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: food-delivery-preview-cleanup
      Description: Delete temporary food-delivery runtime after its lifetime expires
      State: ENABLED
      ScheduleExpression: !Ref CleanupScheduleExpression
      ScheduleExpressionTimezone: UTC
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn:
          Fn::ImportValue: food-delivery-cleanup-state-machine-arn
        RoleArn:
          Fn::ImportValue: food-delivery-cleanup-scheduler-role-arn
        Input: "{}"
        RetryPolicy:
          MaximumEventAgeInSeconds: 3600
          MaximumRetryAttempts: 3

Outputs:
  ClusterName:
    Value: !Ref PreviewCluster
  OrderTargetGroupArn:
    Value: !Ref OrderTargetGroup
  RestaurantTargetGroupArn:
    Value: !Ref RestaurantTargetGroup
  OrderTaskSecurityGroupId:
    Value: !Ref OrderTaskSecurityGroup
  RestaurantTaskSecurityGroupId:
    Value: !Ref RestaurantTaskSecurityGroup
  SubnetIds:
    Value:
      Fn::ImportValue: food-delivery-network-public-subnet-ids
  ApiEndpoint:
    Value:
      Fn::ImportValue: food-delivery-http-api-endpoint
