AWSTemplateFormatVersion: "2010-09-09"

Description: >-
  Temporary shared Fargate preview platform. Imports the permanent network
  and creates an ECS cluster, an internet-facing ALB, one target group for
  order-service, a listener, and security groups.

Parameters:
  AllowedCidr:
    Type: String
    Default: "0.0.0.0/0"

  OrderServiceContainerPort:
    Type: Number
    Default: 8080
    MinValue: 1
    MaxValue: 65535

  OrderServiceHealthCheckPath:
    Type: String
    Default: "/health"

Resources:
  PreviewCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: food-delivery-preview-cluster
      ClusterSettings:
        - Name: containerInsights
          Value: disabled
      Tags:
        - Key: Project
          Value: food-delivery
        - Key: Environment
          Value: preview
        - Key: ManagedBy
          Value: CloudFormation

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public HTTP access to the preview ALB
      VpcId:
        Fn::ImportValue: food-delivery-network-vpc-id
      SecurityGroupIngress:
        - Description: Public preview HTTP
          IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AllowedCidr
      SecurityGroupEgress:
        - Description: ALB traffic to Fargate tasks
          IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: food-delivery-preview-alb-sg
        - Key: Project
          Value: food-delivery
        - Key: Environment
          Value: preview

  TaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow the preview ALB to reach Fargate tasks
      VpcId:
        Fn::ImportValue: food-delivery-network-vpc-id
      SecurityGroupIngress:
        - Description: ALB to order-service
          IpProtocol: tcp
          FromPort: !Ref OrderServiceContainerPort
          ToPort: !Ref OrderServiceContainerPort
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      SecurityGroupEgress:
        - Description: Outbound application and AWS API traffic
          IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: food-delivery-preview-task-sg
        - Key: Project
          Value: food-delivery
        - Key: Environment
          Value: preview

  PreviewLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: food-delivery-preview-alb
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets:
        - Fn::ImportValue: food-delivery-network-public-subnet-a-id
        - Fn::ImportValue: food-delivery-network-public-subnet-b-id
      Tags:
        - Key: Project
          Value: food-delivery
        - Key: Environment
          Value: preview

  OrderServiceTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: food-delivery-order-preview
      VpcId:
        Fn::ImportValue: food-delivery-network-vpc-id
      Protocol: HTTP
      Port: !Ref OrderServiceContainerPort
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPort: traffic-port
      HealthCheckPath: !Ref OrderServiceHealthCheckPath
      HealthCheckIntervalSeconds: 15
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200-399"
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "15"
      Tags:
        - Key: Project
          Value: food-delivery
        - Key: Service
          Value: order-service
        - Key: Environment
          Value: preview

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref PreviewLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref OrderServiceTargetGroup

Outputs:
  ClusterName:
    Value: !Ref PreviewCluster

  ClusterArn:
    Value: !GetAtt PreviewCluster.Arn

  TargetGroupArn:
    Value: !Ref OrderServiceTargetGroup

  TaskSecurityGroupId:
    Value: !Ref TaskSecurityGroup

  SubnetIds:
    Value:
      Fn::ImportValue: food-delivery-network-public-subnet-ids

  ContainerPort:
    Value: !Ref OrderServiceContainerPort

  LoadBalancerDnsName:
    Value: !GetAtt PreviewLoadBalancer.DNSName

  PublicUrl:
    Value: !Sub "http://${PreviewLoadBalancer.DNSName}"
