AWSTemplateFormatVersion: "2010-09-09"
Description: Permanent order-service payment infrastructure.

Parameters:
  OrderEventBusName:
    Type: String
    Default: food-delivery-orders

  StepFunctionsRoleName:
    Type: String
    Default: sfn-order-service-role

  LambdaRoleName:
    Type: String
    Default: lambda-order-service-role

  PaymentStateMachineName:
    Type: String
    Default: payment-confirmation-sm

  PaypalWebhookFunctionName:
    Type: String
    Default: paypal_webhook

  PaypalWebhookPath:
    Type: String
    Default: /api/payments/paypal/webhook

  EnablePaypalWebhookRoute:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"

Conditions:
  CreatePaypalWebhookRoute: !Equals [!Ref EnablePaypalWebhookRoute, "true"]

Resources:
  OrderEventsBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref OrderEventBusName
      Tags:
        - Key: Project
          Value: food-delivery
        - Key: Service
          Value: order-service
        - Key: Lifetime
          Value: permanent

  StepFunctionsInvokePaymentLambdasPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: order-service-payment-lambda-invoke
      Roles:
        - !Ref StepFunctionsRoleName
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - lambda:InvokeFunction
            Resource:
              - !Sub arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:verify_payment
              - !Sub arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:mark_payment_result
              - !Sub arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:publish_order_event

  LambdaOrderServicePaymentsPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: order-service-payments
      Roles:
        - !Ref LambdaRoleName
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - events:PutEvents
            Resource: !GetAtt OrderEventsBus.Arn
          - Effect: Allow
            Action:
              - states:StartExecution
            Resource: !Sub arn:${AWS::Partition}:states:${AWS::Region}:${AWS::AccountId}:stateMachine:${PaymentStateMachineName}

  PaypalWebhookIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Condition: CreatePaypalWebhookRoute
    Properties:
      ApiId:
        Fn::ImportValue: food-delivery-http-api-id
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${PaypalWebhookFunctionName}
      PayloadFormatVersion: "2.0"

  PaypalWebhookRoute:
    Type: AWS::ApiGatewayV2::Route
    Condition: CreatePaypalWebhookRoute
    Properties:
      ApiId:
        Fn::ImportValue: food-delivery-http-api-id
      RouteKey: !Sub POST ${PaypalWebhookPath}
      AuthorizationType: NONE
      Target: !Sub integrations/${PaypalWebhookIntegration}

  PaypalWebhookPermission:
    Type: AWS::Lambda::Permission
    Condition: CreatePaypalWebhookRoute
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref PaypalWebhookFunctionName
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub
        - arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApiId}/*/POST${PaypalWebhookPath}
        - HttpApiId:
            Fn::ImportValue: food-delivery-http-api-id

Outputs:
  EventBusName:
    Value: !Ref OrderEventsBus
  EventBusArn:
    Value: !GetAtt OrderEventsBus.Arn
