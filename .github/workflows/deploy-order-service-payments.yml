name: Deploy order-service payments

on:
  workflow_dispatch:
    inputs:
      enable_webhook_route:
        description: Create the public PayPal webhook route after paypal_webhook exists
        required: true
        default: false
        type: boolean
      create_iam_roles:
        description: Create sfn-order-service-role and lambda-order-service-role in this stack
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: food-delivery-order-payments
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  STACK_NAME: food-delivery-order-payments
  TEMPLATE_FILE: infrastructure/order-service-payments.yml

jobs:
  deploy:
    name: Deploy order-service payment infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate region
        run: |
          set -euo pipefail

          if [[ "$AWS_REGION" != "us-east-1" ]]; then
            echo "::error::AWS_REGION must be us-east-1 for this infrastructure. Current value: $AWS_REGION"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: order-payments-deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Validate CloudFormation template
        run: |
          set -euo pipefail

          aws cloudformation validate-template \
            --template-body "file://${TEMPLATE_FILE}" \
            --region "$AWS_REGION" \
            >/dev/null

      - name: Deploy order-service payment infrastructure
        run: |
          set -euo pipefail

          aws cloudformation deploy \
            --stack-name "$STACK_NAME" \
            --template-file "$TEMPLATE_FILE" \
            --region "$AWS_REGION" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              EnablePaypalWebhookRoute="${{ inputs.enable_webhook_route }}" \
              CreateOrderServiceIamRoles="${{ inputs.create_iam_roles }}"

      - name: Show CloudFormation outputs
        run: |
          set -euo pipefail

          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[].{Key:OutputKey,Value:OutputValue}" \
            --output table

          {
            echo "## order-service payments outputs"
            echo
            aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --region "$AWS_REGION" \
              --query "Stacks[0].Outputs[].{Key:OutputKey,Value:OutputValue}" \
              --output table
          } >> "$GITHUB_STEP_SUMMARY"
