name: Delete preview Fargate platform

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  NETWORK_STACK_NAME: food-delivery-network
  PLATFORM_STACK_NAME: food-delivery-preview-platform
  ORDER_RUNTIME_STACK_NAME: order-service-runtime
  RESTAURANT_RUNTIME_STACK_NAME: restaurant-service-runtime

jobs:
  delete:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: manual-preview-cleanup-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true
          unset-current-credentials: true

      - name: Delete stacks in dependency order
        run: |
          set -euo pipefail

          stack_exists() {
            aws cloudformation describe-stacks \
              --stack-name "$1" \
              --region "$AWS_REGION" \
              >/dev/null 2>&1
          }

          delete_stack() {
            local stack_name="$1"

            if ! stack_exists "$stack_name"; then
              echo "Stack $stack_name does not exist."
              return 0
            fi

            echo "Deleting $stack_name..."
            aws cloudformation delete-stack \
              --stack-name "$stack_name" \
              --region "$AWS_REGION"

            aws cloudformation wait stack-delete-complete \
              --stack-name "$stack_name" \
              --region "$AWS_REGION"

            echo "Deleted $stack_name."
          }

          delete_stack "$ORDER_RUNTIME_STACK_NAME"
          delete_stack "$RESTAURANT_RUNTIME_STACK_NAME"
          delete_stack "$PLATFORM_STACK_NAME"

          echo "Permanent network stack $NETWORK_STACK_NAME remains."