name: Deploy DynamoDB tables

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "infrastructure/dynamodb-tables.yml"
      - ".github/workflows/deploy-dynamodb.yml"

# Нужны для GitHub OIDC.
permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-dynamodb-production
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  STACK_NAME: food-delivery-dynamodb
  TEMPLATE_FILE: infrastructure/dynamodb-tables.yml

jobs:
  deploy:
    name: Deploy persistent tables
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: dynamodb-deploy-${{ github.run_id }}
          aws-region: ${{ secrets.AWS_REGION }}
          mask-aws-account-id: true

      - name: Validate CloudFormation template
        run: |
          aws cloudformation validate-template \
            --template-body "file://${TEMPLATE_FILE}" \
            --region "${AWS_REGION}"

      - name: Deploy DynamoDB stack
        run: |
          aws cloudformation deploy \
            --stack-name "${STACK_NAME}" \
            --template-file "${TEMPLATE_FILE}" \
            --region "${AWS_REGION}" \
            --no-fail-on-empty-changeset \
            --tags \
              Project=food-delivery \
              ManagedBy=GitHubActions

      - name: Show stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[*].{Key:OutputKey,Value:OutputValue}" \
            --output table

      - name: Verify table status
        run: |
          for table in active_orders courier_states; do
            aws dynamodb wait table-exists \
              --table-name "${table}" \
              --region "${AWS_REGION}"

            aws dynamodb describe-table \
              --table-name "${table}" \
              --region "${AWS_REGION}" \
              --query "Table.{Name:TableName,Status:TableStatus,Indexes:GlobalSecondaryIndexes[].{Name:IndexName,Status:IndexStatus}}" \
              --output json
          done