name: Deploy delivery and restaurant preview

on:
  workflow_dispatch:
    inputs:
      lifetime_minutes:
        description: Minutes before AWS automatically deletes the temporary runtime
        required: true
        default: "60"
        type: string

      cors_allowed_origin:
        description: Frontend origin allowed by API Gateway CORS
        required: true
        default: "*"
        type: string

      delivery_container_port:
        description: Port exposed by delivery-service
        required: true
        default: "8080"
        type: string

      restaurant_container_port:
        description: Port exposed by restaurant-service
        required: true
        default: "8080"
        type: string

      delivery_health_check_path:
        description: ALB health-check path for delivery-service
        required: true
        default: "/health"
        type: string

      restaurant_health_check_path:
        description: ALB health-check path for restaurant-service
        required: true
        default: "/health"
        type: string

      delivery_base_path:
        description: API base path for delivery-service, without trailing slash
        required: true
        default: "/api/deliveries"
        type: string

      restaurant_base_path:
        description: API base path for restaurant-service, without trailing slash
        required: true
        default: "/api/restaurants"
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: food-delivery-preview-platform
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  NETWORK_STACK_NAME: food-delivery-network
  AUTH_API_STACK_NAME: food-delivery-auth-api
  CLEANUP_STACK_NAME: food-delivery-cleanup
  PLATFORM_STACK_NAME: food-delivery-preview-platform

jobs:
  deploy:
    name: Deploy platform and schedule AWS cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: preview-deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Validate inputs
        env:
          LIFETIME_MINUTES: ${{ inputs.lifetime_minutes }}
          DELIVERY_CONTAINER_PORT: ${{ inputs.delivery_container_port }}
          RESTAURANT_CONTAINER_PORT: ${{ inputs.restaurant_container_port }}
          DELIVERY_HEALTH_PATH: ${{ inputs.delivery_health_check_path }}
          RESTAURANT_HEALTH_PATH: ${{ inputs.restaurant_health_check_path }}
          DELIVERY_BASE_PATH: ${{ inputs.delivery_base_path }}
          RESTAURANT_BASE_PATH: ${{ inputs.restaurant_base_path }}
          RESTAURANT_SERVICE_IMAGE_URI: ${{ secrets.RESTAURANT_SERVICE_IMAGE_URI }}
          SECRET_ARN: ${{ secrets.SECRET_ARN }}
        run: |
          set -euo pipefail

          if ! [[ "$LIFETIME_MINUTES" =~ ^[0-9]+$ ]]; then
            echo "::error::lifetime_minutes must be an integer"
            exit 1
          fi

          if (( LIFETIME_MINUTES < 5 || LIFETIME_MINUTES > 1440 )); then
            echo "::error::lifetime_minutes must be between 5 and 1440"
            exit 1
          fi

          for port in "$DELIVERY_CONTAINER_PORT" "$RESTAURANT_CONTAINER_PORT"; do
            if ! [[ "$port" =~ ^[0-9]+$ ]] || (( port < 1 || port > 65535 )); then
              echo "::error::Container ports must be between 1 and 65535"
              exit 1
            fi
          done

          for path in \
            "$DELIVERY_HEALTH_PATH" \
            "$RESTAURANT_HEALTH_PATH" \
            "$DELIVERY_BASE_PATH" \
            "$RESTAURANT_BASE_PATH"
          do
            if [[ "$path" != /* ]]; then
              echo "::error::Every HTTP path must start with /"
              exit 1
            fi
          done

          if [[ "$DELIVERY_BASE_PATH" == */ || "$RESTAURANT_BASE_PATH" == */ ]]; then
            echo "::error::Service base paths must not end with /"
            exit 1
          fi

          if [[ -n "$RESTAURANT_SERVICE_IMAGE_URI" ]]; then
            if [[ "$RESTAURANT_SERVICE_IMAGE_URI" == arn:* ]]; then
              echo "::error::RESTAURANT_SERVICE_IMAGE_URI must be a container image URI, not an ECR ARN"
              exit 1
            fi

            if [[ "$RESTAURANT_SERVICE_IMAGE_URI" != *".dkr.ecr."*".amazonaws.com/"* ]]; then
              echo "::error::RESTAURANT_SERVICE_IMAGE_URI must look like an ECR image URI"
              exit 1
            fi
          fi

          if [[ -n "$SECRET_ARN" && "$SECRET_ARN" != arn:aws:secretsmanager:* ]]; then
            echo "::error::SECRET_ARN must be a Secrets Manager secret ARN"
            exit 1
          fi

      - name: Validate CloudFormation templates
        run: |
          set -euo pipefail

          for template in \
            infrastructure/network.yml \
            infrastructure/auth-api.yml \
            infrastructure/cleanup.yml \
            infrastructure/preview-platform.yml
          do
            aws cloudformation validate-template \
              --template-body "file://${template}" \
              --region "$AWS_REGION" \
              >/dev/null
          done

      - name: Deploy permanent network
        run: |
          set -euo pipefail

          aws cloudformation deploy \
            --stack-name "$NETWORK_STACK_NAME" \
            --template-file infrastructure/network.yml \
            --region "$AWS_REGION" \
            --no-fail-on-empty-changeset

      - name: Deploy permanent Cognito and API Gateway
        run: |
          set -euo pipefail

          aws cloudformation deploy \
            --stack-name "$AUTH_API_STACK_NAME" \
            --template-file infrastructure/auth-api.yml \
            --region "$AWS_REGION" \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              CorsAllowedOrigin="${{ inputs.cors_allowed_origin }}"

      - name: Deploy permanent cleanup mechanism
        run: |
          set -euo pipefail

          aws cloudformation deploy \
            --stack-name "$CLEANUP_STACK_NAME" \
            --template-file infrastructure/cleanup.yml \
            --region "$AWS_REGION" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Check temporary platform state
        run: |
          set -euo pipefail

          if ! STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$PLATFORM_STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null)
          then
            echo "Temporary platform does not exist yet."
            exit 0
          fi

          case "$STATUS" in
            DELETE_FAILED)
              echo "::error::$PLATFORM_STACK_NAME is in DELETE_FAILED. Run 'Start AWS cleanup now'."
              exit 1
              ;;
            DELETE_IN_PROGRESS)
              echo "::error::$PLATFORM_STACK_NAME is being deleted. Wait for cleanup to finish."
              exit 1
              ;;
            *)
              echo "Existing platform status: $STATUS"
              ;;
          esac

      - name: Calculate one-time cleanup time
        id: lifetime
        env:
          LIFETIME_MINUTES: ${{ inputs.lifetime_minutes }}
        run: |
          set -euo pipefail

          DELETE_AT=$(date -u \
            -d "+${LIFETIME_MINUTES} minutes" \
            "+%Y-%m-%dT%H:%M:%S")

          echo "schedule-expression=at(${DELETE_AT})" >> "$GITHUB_OUTPUT"
          echo "delete-at=${DELETE_AT} UTC" >> "$GITHUB_OUTPUT"

      - name: Resolve restaurant-service image
        id: restaurant-image
        env:
          RESTAURANT_SERVICE_IMAGE_URI: ${{ secrets.RESTAURANT_SERVICE_IMAGE_URI }}
        run: |
          set -euo pipefail

          if [[ -z "$RESTAURANT_SERVICE_IMAGE_URI" ]]; then
            echo "image-uri=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$RESTAURANT_SERVICE_IMAGE_URI" == *@sha256:* ]]; then
            echo "image-uri=$RESTAURANT_SERVICE_IMAGE_URI" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          registry="${RESTAURANT_SERVICE_IMAGE_URI%%/*}"
          repository_and_tag="${RESTAURANT_SERVICE_IMAGE_URI#*/}"
          repository="$repository_and_tag"
          tag=""

          if [[ "$repository_and_tag" == *:* ]]; then
            repository="${repository_and_tag%:*}"
            tag="${repository_and_tag##*:}"
          fi

          if [[ -z "$repository" || "$repository" == "$registry" ]]; then
            echo "::error::RESTAURANT_SERVICE_IMAGE_URI must include an ECR repository path"
            exit 1
          fi

          if [[ -n "$tag" && "$tag" != "latest" ]]; then
            echo "image-uri=$RESTAURANT_SERVICE_IMAGE_URI" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          registry_id="${registry%%.dkr.ecr.*}"
          image_digest=$(aws ecr describe-images \
            --registry-id "$registry_id" \
            --repository-name "$repository" \
            --region "$AWS_REGION" \
            --query 'sort_by(imageDetails[?imagePushedAt!=`null`], &imagePushedAt)[-1].imageDigest' \
            --output text)

          if [[ -z "$image_digest" || "$image_digest" == "None" ]]; then
            echo "::error::No images found in ECR repository $repository"
            exit 1
          fi

          echo "image-uri=${registry}/${repository}@${image_digest}" >> "$GITHUB_OUTPUT"
          echo "Resolved restaurant-service image from latest ECR push time."

      - name: Deploy temporary platform and EventBridge schedule
        run: |
          set -euo pipefail

          aws cloudformation deploy \
            --stack-name "$PLATFORM_STACK_NAME" \
            --template-file infrastructure/preview-platform.yml \
            --region "$AWS_REGION" \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              DeliveryServiceContainerPort="${{ inputs.delivery_container_port }}" \
              RestaurantServiceContainerPort="${{ inputs.restaurant_container_port }}" \
              DeliveryServiceHealthCheckPath="${{ inputs.delivery_health_check_path }}" \
              RestaurantServiceHealthCheckPath="${{ inputs.restaurant_health_check_path }}" \
              DeliveryServiceBasePath="${{ inputs.delivery_base_path }}" \
              RestaurantServiceBasePath="${{ inputs.restaurant_base_path }}" \
              RestaurantServiceImageUri="${{ steps.restaurant-image.outputs.image-uri }}" \
              RestaurantDatabaseSecretArn="${{ secrets.SECRET_ARN }}" \
              CleanupScheduleExpression="${{ steps.lifetime.outputs.schedule-expression }}"

      - name: Show deployment summary
        env:
          RESTAURANT_SERVICE_IMAGE_URI: ${{ steps.restaurant-image.outputs.image-uri }}
        run: |
          set -euo pipefail

          API_ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name "$AUTH_API_STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
            --output text)

          {
            echo "## Food-delivery preview"
            echo
            echo "- API endpoint: ${API_ENDPOINT}"
            echo "- Delivery: ${API_ENDPOINT}${{ inputs.delivery_base_path }}"
            echo "- Restaurants: ${API_ENDPOINT}${{ inputs.restaurant_base_path }}"
            if [[ -n "$RESTAURANT_SERVICE_IMAGE_URI" ]]; then
              echo "- Restaurant ECS service: enabled"
            else
              echo "- Restaurant ECS service: skipped (missing RESTAURANT_SERVICE_IMAGE_URI secret)"
            fi
            echo "- Lifetime: ${{ inputs.lifetime_minutes }} minutes"
            echo "- Scheduled AWS cleanup: ${{ steps.lifetime.outputs.delete-at }}"
            echo
            echo "GitHub Actions has finished. EventBridge Scheduler will start Step Functions."
          } >> "$GITHUB_STEP_SUMMARY"
