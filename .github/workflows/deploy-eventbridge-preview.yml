name: Deploy cleanup permissions fix

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  CLEANUP_STACK_NAME: food-delivery-cleanup

jobs:
  deploy-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: cleanup-fix-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Validate cleanup template
        run: |
          set -euo pipefail

          aws cloudformation validate-template \
            --template-body file://infrastructure/cleanup.yml \
            --region "$AWS_REGION" \
            >/dev/null

      - name: Update permanent cleanup stack
        run: |
          set -euo pipefail

          aws cloudformation deploy \
            --stack-name "$CLEANUP_STACK_NAME" \
            --template-file infrastructure/cleanup.yml \
            --region "$AWS_REGION" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Show fixed role
        run: |
          set -euo pipefail

          ROLE_ARN=$(aws cloudformation describe-stacks \
            --stack-name "$CLEANUP_STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFormationExecutionRoleArn'].OutputValue" \
            --output text)

          {
            echo "## Cleanup permissions fixed"
            echo
            echo "- CloudFormation execution role: ${ROLE_ARN}"
            echo "- Next: run **Start AWS cleanup now**"
          } >> "$GITHUB_STEP_SUMMARY"
