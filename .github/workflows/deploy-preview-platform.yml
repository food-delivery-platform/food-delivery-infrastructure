name: Deploy preview Fargate platform

on:
  workflow_dispatch:
    inputs:
      lifetime_minutes:
        description: How long the temporary platform should live
        required: true
        default: "60"
        type: string
      allowed_cidr:
        description: CIDR allowed to access the ALB; empty means 0.0.0.0/0
        required: false
        default: ""
        type: string
      order_container_port:
        description: Port exposed by order-service
        required: true
        default: "8080"
        type: string
      restaurant_container_port:
        description: Port exposed by restaurant-service
        required: true
        default: "8080"
        type: string
      order_health_check_path:
        description: Health-check path for order-service
        required: true
        default: "/health"
        type: string
      restaurant_health_check_path:
        description: Health-check path for restaurant-service
        required: true
        default: "/health"
        type: string
      order_path_pattern:
        description: ALB path pattern for order-service
        required: true
        default: "/api/orders*"
        type: string
      restaurant_path_pattern:
        description: ALB path pattern for restaurant-service
        required: true
        default: "/api/restaurants*"
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: food-delivery-preview-platform
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  NETWORK_STACK_NAME: food-delivery-network
  PLATFORM_STACK_NAME: food-delivery-preview-platform
  ORDER_RUNTIME_STACK_NAME: order-service-runtime
  RESTAURANT_RUNTIME_STACK_NAME: restaurant-service-runtime
  NETWORK_TEMPLATE_FILE: infrastructure/network.yml
  PLATFORM_TEMPLATE_FILE: infrastructure/preview-platform.yml

jobs:
  deploy-and-clean:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials for deployment
        uses: aws-actions/configure-aws-credentials@v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: preview-deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Validate inputs
        id: config
        env:
          INPUT_LIFETIME: ${{ inputs.lifetime_minutes }}
          INPUT_ALLOWED_CIDR: ${{ inputs.allowed_cidr }}
        run: |
          set -euo pipefail

          if ! [[ "$INPUT_LIFETIME" =~ ^[0-9]+$ ]]; then
            echo "::error::lifetime_minutes must be an integer"
            exit 1
          fi

          if (( INPUT_LIFETIME < 1 || INPUT_LIFETIME > 90 )); then
            echo "::error::lifetime_minutes must be between 1 and 90"
            exit 1
          fi

          ALLOWED_CIDR="$INPUT_ALLOWED_CIDR"
          if [[ -z "$ALLOWED_CIDR" ]]; then
            ALLOWED_CIDR="0.0.0.0/0"
          fi

          echo "allowed-cidr=$ALLOWED_CIDR" >> "$GITHUB_OUTPUT"
          echo "lifetime-minutes=$INPUT_LIFETIME" >> "$GITHUB_OUTPUT"

      - name: Validate CloudFormation templates
        run: |
          set -euo pipefail

          aws cloudformation validate-template \
            --template-body "file://${NETWORK_TEMPLATE_FILE}" \
            --region "$AWS_REGION" \
            >/dev/null

          aws cloudformation validate-template \
            --template-body "file://${PLATFORM_TEMPLATE_FILE}" \
            --region "$AWS_REGION" \
            >/dev/null

      - name: Deploy permanent network
        run: |
          set -euo pipefail

          aws cloudformation deploy \
            --stack-name "$NETWORK_STACK_NAME" \
            --template-file "$NETWORK_TEMPLATE_FILE" \
            --region "$AWS_REGION" \
            --no-fail-on-empty-changeset \
            --tags \
              Project=food-delivery \
              Layer=network \
              Lifetime=permanent \
              ManagedBy=GitHubActions

      - name: Deploy temporary platform
        id: platform
        continue-on-error: true
        run: |
          set -euo pipefail

          aws cloudformation deploy \
            --stack-name "$PLATFORM_STACK_NAME" \
            --template-file "$PLATFORM_TEMPLATE_FILE" \
            --region "$AWS_REGION" \
            --no-fail-on-empty-changeset \
            --tags \
              Project=food-delivery \
              Environment=preview \
              Lifetime=temporary \
              ManagedBy=GitHubActions \
              GitHubRunId="${GITHUB_RUN_ID}" \
            --parameter-overrides \
              AllowedCidr="${{ steps.config.outputs.allowed-cidr }}" \
              OrderServiceContainerPort="${{ inputs.order_container_port }}" \
              RestaurantServiceContainerPort="${{ inputs.restaurant_container_port }}" \
              OrderServiceHealthCheckPath="${{ inputs.order_health_check_path }}" \
              RestaurantServiceHealthCheckPath="${{ inputs.restaurant_health_check_path }}" \
              OrderServicePathPattern="${{ inputs.order_path_pattern }}" \
              RestaurantServicePathPattern="${{ inputs.restaurant_path_pattern }}"

      - name: Show platform outputs
        if: steps.platform.outcome == 'success'
        run: |
          set -euo pipefail

          aws cloudformation describe-stacks \
            --stack-name "$PLATFORM_STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[*].{Key:OutputKey,Value:OutputValue}" \
            --output table

          PUBLIC_URL=$(aws cloudformation describe-stacks \
            --stack-name "$PLATFORM_STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='PublicUrl'].OutputValue" \
            --output text)

          {
            echo "## Temporary food-delivery platform"
            echo
            echo "- Base URL: ${PUBLIC_URL}"
            echo "- Lifetime: ${{ steps.config.outputs.lifetime-minutes }} minutes"
            echo "- Run the service deployment workflows while this platform exists."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Keep temporary resources alive
        if: steps.platform.outcome == 'success'
        run: |
          set -euo pipefail
          sleep $(( ${{ steps.config.outputs.lifetime-minutes }} * 60 ))

      # Critical fix: the credentials obtained before the one-hour sleep normally
      # expire after 3600 seconds. Obtain a fresh OIDC session before cleanup.
      - name: Refresh AWS credentials before cleanup
        if: always()
        uses: aws-actions/configure-aws-credentials@v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: preview-cleanup-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true
          unset-current-credentials: true

      - name: Delete service runtimes and temporary platform
        if: always()
        run: |
          set -euo pipefail

          stack_exists() {
            aws cloudformation describe-stacks \
              --stack-name "$1" \
              --region "$AWS_REGION" \
              >/dev/null 2>&1
          }

          delete_stack() {
            local stack_name="$1"

            if ! stack_exists "$stack_name"; then
              echo "Stack $stack_name does not exist."
              return 0
            fi

            echo "Deleting $stack_name..."
            aws cloudformation delete-stack \
              --stack-name "$stack_name" \
              --region "$AWS_REGION"

            aws cloudformation wait stack-delete-complete \
              --stack-name "$stack_name" \
              --region "$AWS_REGION"

            echo "Deleted $stack_name."
          }

          delete_stack "$ORDER_RUNTIME_STACK_NAME"
          delete_stack "$RESTAURANT_RUNTIME_STACK_NAME"
          delete_stack "$PLATFORM_STACK_NAME"

          echo "Permanent network stack $NETWORK_STACK_NAME remains."

      - name: Report platform deployment failure
        if: steps.platform.outcome != 'success'
        run: |
          echo "::error::Preview platform deployment failed."
          exit 1
